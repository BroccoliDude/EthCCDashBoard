<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EthCC[9] Events — Cannes 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #2a2a3a;
    --accent: #7b6ef6;
    --accent2: #f06060;
    --accent3: #4ecdc4;
    --accent4: #ffd166;
    --text: #e8e8f0;
    --text-dim: #888899;
    --vc: #b388ff;
    --bd: #4fc3f7;
    --mkt: #f06292;
    --dev: #69f0ae;
    --founder: #ffd54f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    position: relative;
    padding: 60px 40px 40px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, #0a0a0f 0%, #12101e 50%, #0a0a0f 100%);
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -60px; left: -60px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(123,110,246,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -80px; right: 10%;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(78,205,196,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-grid {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }
  .header-left h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 800;
    letter-spacing: -1px;
    line-height: 1.05;
    background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-left .subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .header-actions {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.18s;
    border: none;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #9080ff; transform: translateY(-1px); box-shadow: 0 4px 20px rgba(123,110,246,0.4); }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .event-count-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .stat-item {
    flex: 1;
    min-width: 120px;
    padding: 20px 24px;
    border-right: 1px solid var(--border);
    text-align: center;
  }
  .stat-item:last-child { border-right: none; }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
  }
  .stat-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 4px;
  }

  /* CONTROLS */
  .controls {
    padding: 20px 40px;
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 10px 16px 10px 38px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.18s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 14px;
  }
  .filter-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-btn {
    padding: 7px 14px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.5px;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .filter-btn:hover, .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .filter-btn.tag-vc.active { background: var(--vc); border-color: var(--vc); }
  .filter-btn.tag-bd.active { background: var(--bd); border-color: var(--bd); }
  .filter-btn.tag-mkt.active { background: var(--mkt); border-color: var(--mkt); }
  .filter-btn.tag-dev.active { background: var(--dev); border-color: var(--dev); color: #111; }
  .filter-btn.tag-founder.active { background: var(--founder); border-color: var(--founder); color: #111; }
  select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 8px 12px;
    border-radius: 6px;
    outline: none;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* DAY TABS */
  .day-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    padding: 0 40px;
    background: var(--surface);
  }
  .day-tab {
    padding: 14px 24px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--text-dim);
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .day-tab:hover { color: var(--text); }
  .day-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .day-tab .count { 
    display: inline-block;
    background: var(--surface2);
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 10px;
    margin-left: 6px;
    color: var(--text-dim);
  }

  /* EVENTS GRID */
  .main {
    padding: 32px 40px;
  }
  .events-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
  .event-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .event-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(123,110,246,0.15);
  }
  .event-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    opacity: 0;
    transition: opacity 0.2s;
  }
  .event-card:hover::before { opacity: 1; }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 12px;
  }
  .event-time {
    font-size: 11px;
    color: var(--accent3);
    font-weight: 700;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .status-badge {
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 3px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .status-sold-out { background: rgba(240,96,96,0.15); color: var(--accent2); border: 1px solid rgba(240,96,96,0.3); }
  .status-waitlist { background: rgba(255,209,102,0.12); color: var(--accent4); border: 1px solid rgba(255,209,102,0.25); }
  .status-approval { background: rgba(78,205,196,0.1); color: var(--accent3); border: 1px solid rgba(78,205,196,0.25); }
  .status-request { background: rgba(123,110,246,0.1); color: var(--accent); border: 1px solid rgba(123,110,246,0.25); }
  .status-closed { background: rgba(100,100,120,0.1); color: #666; border: 1px solid rgba(100,100,120,0.2); }
  .status-open { background: rgba(105,240,174,0.1); color: var(--dev); border: 1px solid rgba(105,240,174,0.2); }
  .event-name {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--text);
    margin-bottom: 8px;
  }
  .event-organizer {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .event-location {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 12px;
  }
  .tags-row {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .tag {
    font-size: 9px;
    padding: 2px 8px;
    border-radius: 3px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .tag-vc { background: rgba(179,136,255,0.12); color: var(--vc); border: 1px solid rgba(179,136,255,0.25); }
  .tag-bd { background: rgba(79,195,247,0.12); color: var(--bd); border: 1px solid rgba(79,195,247,0.25); }
  .tag-mkt { background: rgba(240,98,146,0.12); color: var(--mkt); border: 1px solid rgba(240,98,146,0.25); }
  .tag-dev { background: rgba(105,240,174,0.12); color: var(--dev); border: 1px solid rgba(105,240,174,0.25); }
  .tag-founder { background: rgba(255,213,79,0.12); color: var(--founder); border: 1px solid rgba(255,213,79,0.25); }

  .score-pill {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 700;
  }
  .score-pill .score-label { color: var(--text-dim); }
  .score-pill .score-val { color: var(--text); }
  .card-footer {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-link {
    font-size: 11px;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.5px;
    font-weight: 700;
    transition: color 0.15s;
  }
  .card-link:hover { color: #9080ff; }
  
  .no-results {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
    grid-column: 1 / -1;
  }
  .no-results .icon { font-size: 48px; margin-bottom: 16px; }
  .no-results h3 { font-family: 'Syne', sans-serif; font-size: 20px; margin-bottom: 8px; color: var(--text); }


  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .event-card {
    animation: fadeUp 0.3s ease both;
  }

  /* FOOTER */
  .footer {
    text-align: center;
    padding: 32px;
    border-top: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 1px;
  }

  @media (max-width: 600px) {
    .header, .controls, .main { padding-left: 16px; padding-right: 16px; }
    .day-tabs { padding: 0 16px; }
    .events-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

  <select id="sortBy" onchange="render()">

</div>

<div class="day-tabs" id="dayTabs"></div>

<div class="main">
  <div class="events-grid" id="eventsGrid"></div>
</div>

const DATES = ['Mar 28, 2026','Mar 29, 2026','Mar 30, 2026','Mar 31, 2026','Apr 01, 2026','Apr 02, 2026'];
const DAY_NAMES = ['Sat', 'Sun', 'Mon', 'Tue', 'Wed', 'Thu'];

let activeDay = 'ALL';
let activeTag = 'ALL';

function setTagFilter(tag) {
  activeTag = tag;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tag' + tag).classList.add('active');
  render();
}

function setDay(day) {
  activeDay = day;
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('daytab-' + day.replace(/\s/g,'_').replace(/,/g,'')).classList.add('active');
  render();
}

function getStatusClass(status) {
  if (!status) return 'status-open';
  if (status === 'Sold Out') return 'status-sold-out';
  if (status === 'Waitlist') return 'status-waitlist';
  if (status === 'Approval Required') return 'status-approval';
  if (status === 'Request To Join') return 'status-request';
  if (status === 'Closed') return 'status-closed';
  return 'status-open';
}

function buildDayTabs() {
  const tabs = document.getElementById('dayTabs');
  let allCount = EVENTS.length;
  let html = `<div class="day-tab active" id="daytab-ALL" onclick="setDay('ALL')">All Days <span class="count">${allCount}</span></div>`;
  DATES.forEach((d, i) => {
    const c = EVENTS.filter(e => e.date === d).length;
    const id = 'daytab-' + d.replace(/\s/g,'_').replace(/,/g,'');
    html += `<div class="day-tab" id="${id}" onclick="setDay('${d}')">${DAY_NAMES[i]} · ${d.split(' ').slice(0,2).join(' ')} <span class="count">${c}</span></div>`;
  });
  tabs.innerHTML = html;
}

function buildStats() {
  const bar = document.getElementById('statsBar');
  const total = EVENTS.length;
  const soldOut = EVENTS.filter(e => e.status === 'Sold Out').length;
  const waitlist = EVENTS.filter(e => e.status === 'Waitlist').length;
  const approval = EVENTS.filter(e => e.status === 'Approval Required').length;
  const byTag = {};
  ['VC','BD','MKT','DEV','FOUNDER'].forEach(t => {
    byTag[t] = EVENTS.filter(e => e.tags && e.tags.includes(t)).length;
  });

}

function tagBadge(tag) {
  const cls = 'tag-' + tag.toLowerCase();
  return `<span class="tag ${cls}">${tag}</span>`;
}

function scoreBar(score, color) {
  const pct = Math.min(score / 5 * 100, 100);
  return `<div class="score-bar-track"><div class="score-bar-fill" style="width:${pct}%;background:${color}"></div></div>`;
}

function render() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const sort = document.getElementById('sortBy').value;

  let filtered = EVENTS.filter(e => {
    if (activeDay !== 'ALL' && e.date !== activeDay) return false;
    if (activeTag !== 'ALL' && (!e.tags || !e.tags.includes(activeTag))) return false;
    if (status !== 'ALL' && e.status !== status) return false;
    if (q && !e.event_name.toLowerCase().includes(q) && !e.organizer.toLowerCase().includes(q)) return false;
    return true;
  });

  // Sort
  if (sort === 'vc') filtered.sort((a,b) => b.VC_score - a.VC_score);
  else if (sort === 'bd') filtered.sort((a,b) => b.BD_score - a.BD_score);
  else if (sort === 'mkt') filtered.sort((a,b) => b.MKT_score - a.MKT_score);
  else if (sort === 'dev') filtered.sort((a,b) => b.DEV_score - a.DEV_score);
  else if (sort === 'founder') filtered.sort((a,b) => b.FOUNDER_score - a.FOUNDER_score);

  document.getElementById('totalBadge').textContent = filtered.length + ' Events';

  const grid = document.getElementById('eventsGrid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="no-results"><div class="icon">🔍</div><h3>No events found</h3><p>Try adjusting your filters</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map((e, i) => {
    const tags = e.tags ? e.tags.split(',').map(t => t.trim()).filter(Boolean) : [];
    const timeStr = e.end_time ? `${e.time} – ${e.end_time}` : e.time;
    const scores = [
      { key: 'VC', val: e.VC_score, color: 'var(--vc)' },
      { key: 'BD', val: e.BD_score, color: 'var(--bd)' },
      { key: 'MKT', val: e.MKT_score, color: 'var(--mkt)' },
      { key: 'DEV', val: e.DEV_score, color: 'var(--dev)' },
      { key: '★', val: e.FOUNDER_score, color: 'var(--founder)' },
    ].filter(s => s.val > 0);
    
    const orgStr = e.organizer && e.organizer !== 'nan' ? e.organizer : '';
    const locStr = e.location && e.location !== 'nan' && e.location !== 'X — shown upon approval'
      ? `<div class="event-location">📍 ${e.location}</div>` : '';

    const topScore = [...scores].sort((a,b) => b.val - a.val)[0];
    const accentColor = topScore ? topScore.color : 'var(--accent)';
    
    return `<div class="event-card" style="animation-delay:${(i%20)*20}ms">
      <div class="card-top">
        <span class="event-time">⏱ ${timeStr}</span>
        <span class="status-badge ${getStatusClass(e.status)}">${e.status || 'Open'}</span>
      </div>
      <div class="event-name">${e.event_name}</div>
      ${orgStr ? `<div class="event-organizer">${orgStr}</div>` : ''}
      ${locStr}
      ${tags.length ? `<div class="tags-row">${tags.map(t => tagBadge(t)).join('')}</div>` : ''}
      <div class="card-footer">
        <span style="font-size:11px;color:var(--text-dim)">${e.date} · ${e.day}</span>
        <a class="card-link" href="${e.link}" target="_blank" rel="noopener">View Event →</a>
      </div>
    </div>`;
  }).join('');
}

function downloadXLSX() {
  const link = document.createElement('a');
  link.href = 'data:application/vnd.openxmlformats-officedocument.spreadsheetml.sheet;base64,' + XLSX_B64;
  link.download = 'EthCC9_Events.xlsx';
  link.click();
}

buildStats();
buildDayTabs();
setTagFilter('ALL');
render();
</script>
</body>
